
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Renewal Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text-muted: #6b6b6b;
    --text-dim: #3d3d3d;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --accent: #c8f04a;
    --radius: 6px;
    --radius-lg: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
  .page { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; }
  .top-left h1 { font-size: 22px; font-weight: 300; letter-spacing: -0.5px; }
  .top-left h1 span { color: var(--accent); }
  .top-left p { font-size: 12px; color: var(--text-muted); margin-top: 5px; font-family: 'DM Mono', monospace; }
  .refresh-btn { display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: var(--radius); border: 1px solid var(--border2); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; text-transform: uppercase; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .refresh-btn svg { width: 13px; height: 13px; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  .last-updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 6px; text-align: right; }
  .metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 28px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 16px; }
  .metric .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 10px; }
  .metric .val { font-size: 22px; font-weight: 300; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
  .metric .sub { font-size: 11px; color: var(--text-dim); margin-top: 5px; }
  .metric.accent-green { border-color: rgba(74,222,128,0.2); }
  .metric.accent-green .val { color: var(--green); }
  .metric.accent-red { border-color: rgba(248,113,113,0.2); }
  .metric.accent-red .val { color: var(--red); }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .chart-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 16px; font-weight: 400; }
  .legend { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .legend span { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .leg-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); width: 54px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-fill2 { height: 100%; border-radius: 3px; position: absolute; top: 0; left: 0; opacity: 0.5; }
  .bar-val { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); width: 70px; flex-shrink: 0; }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .table-header h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 400; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.2s; }
  .controls input { min-width: 200px; }
  .controls input::placeholder { color: var(--text-dim); }
  .controls input:focus, .controls select:focus { border-color: var(--border2); }
  .controls select option { background: #1e1e1e; }
  .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); background: var(--surface2); font-family: 'DM Mono', monospace; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.mono { font-family: 'DM Mono', monospace; font-size: 11px; }
  .days-crit { color: var(--red); font-weight: 500; }
  .days-warn { color: var(--amber); font-weight: 500; }
  .days-past { color: var(--text-dim); font-style: italic; }
  .health-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .h-high { background: var(--green); }
  .h-med  { background: var(--amber); }
  .h-low  { background: var(--red); }
  .h-pend { background: var(--text-dim); }
  .health-cell { display: flex; align-items: center; }
  .error-banner { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 20px; font-size: 12px; color: var(--red); font-family: 'DM Mono', monospace; display: none; }
  .empty { text-align: center; color: var(--text-dim); padding: 32px; font-size: 12px; font-family: 'DM Mono', monospace; }
  #loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.4s; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spin-ring { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
  #loading p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .fade-in { animation: fadeIn 0.4s ease both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 900px) { .metrics { grid-template-columns: repeat(3,1fr); } .charts { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .metrics { grid-template-columns: 1fr 1fr; } .top { flex-direction: column; gap: 14px; } }
</style>
</head>
<body>

<div id="loading">
  <div class="spin-ring"></div>
  <p>Loading pipeline data…</p>
</div>

<div class="page">
  <div class="top">
    <div class="top-left">
      <h1>Contract <span>renewal pipeline</span></h1>
      <p id="subtitle">Loading…</p>
    </div>
    <div style="text-align:right">
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        Refresh
      </button>
      <div class="last-updated" id="lastUpdated"></div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>
  <div class="metrics" id="metrics"></div>

  <div class="charts">
    <div class="chart-box">
      <h3>Monthly pipeline vs weighted (£k)</h3>
      <div class="legend">
        <span><span class="leg-sq" style="background:#60a5fa"></span>Contract value</span>
        <span><span class="leg-sq" style="background:#4ade80"></span>Weighted forecast</span>
      </div>
      <div id="monthly-bars"></div>
    </div>
    <div class="chart-box">
      <h3>Pipeline by health score</h3>
      <div class="legend">
        <span><span class="leg-sq" style="background:#4ade80"></span>High</span>
        <span><span class="leg-sq" style="background:#fbbf24"></span>Medium</span>
        <span><span class="leg-sq" style="background:#f87171"></span>Low</span>
        <span><span class="leg-sq" style="background:#3d3d3d"></span>Pending</span>
      </div>
      <div id="health-bars"></div>
    </div>
  </div>

  <div class="table-header">
    <h2 id="row-count">All contracts</h2>
    <div class="controls">
      <input type="text" id="search" placeholder="Search account…" oninput="renderTable()">
      <select id="fh" onchange="renderTable()">
        <option value="">All health</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
        <option value="Pending">Pending</option>
      </select>
      <select id="so" onchange="renderTable()">
        <option value="days">Sort: days left</option>
        <option value="val">Sort: value ↓</option>
        <option value="name">Sort: name A–Z</option>
      </select>
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:30%">Account</th>
        <th style="width:12%">Contract end</th>
        <th style="width:12%">Next renewal</th>
        <th style="width:7%">Days</th>
        <th style="width:14%">Contract value</th>
        <th style="width:14%">Weighted</th>
        <th style="width:11%">Health</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykqCyvPjt2EIislOezWXt21cBT8w_E8fKwyECAGq3R2knGFSXiSQ8vffMk2j-1A0UB/exec';
const WEIGHT = { High: 0.9, Medium: 0.75, Low: 0.4, Pending: 0 };
let DATA = [];

// Apps Script supports JSONP — use that to avoid CORS
function loadData() {
  return new Promise((resolve, reject) => {
    const cb = '_asCb_' + Date.now();
    const url = APPS_SCRIPT_URL + '?callback=' + cb + '&t=' + Date.now();

    const timer = setTimeout(() => {
      delete window[cb];
      script.remove();
      reject(new Error('Request timed out. Make sure the Apps Script is deployed as "Anyone" access.'));
    }, 15000);

    window[cb] = (raw) => {
      clearTimeout(timer);
      delete window[cb];
      script.remove();
      try {
        // raw may be array directly or wrapped
        const arr = Array.isArray(raw) ? raw : raw.data || [];
        const today = new Date(); today.setHours(0,0,0,0);
        const result = arr
          .filter(r => r.name && r.name !== 'Account Name')
          .map(r => {
            const healthRaw = String(r.health || '').trim();
            const health = ['High','Medium','Low'].includes(healthRaw) ? healthRaw : 'Pending';
            // Recalculate days from today using the renewal date string dd/MM/yyyy
            let days = 0;
            if (r.renewal) {
              const p = r.renewal.split('/');
              if (p.length === 3) {
                const rDate = new Date(+p[2], +p[1]-1, +p[0]);
                days = Math.round((rDate - today) / 86400000);
              }
            }
            const val = parseFloat(String(r.val||0).replace(/[^0-9.-]/g,'')) || 0;
            return { name: r.name, end: r.end||'', renewal: r.renewal||'', days, val, health };
          })
          .filter(d => d.name);
        resolve(result);
      } catch(e) { reject(e); }
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cb];
      reject(new Error('Failed to reach the Apps Script URL. Check it is deployed and access is set to "Anyone".'));
    };
    document.head.appendChild(script);
  });
}

// Helpers
function fmt(n) { return '£' + Math.round(n).toLocaleString(); }
function fmtDate(s) {
  if (!s) return '—';
  const p = s.split('/');
  if (p.length !== 3) return s;
  return p[0] + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]-1] + ' ' + p[2].slice(-2);
}
function wt(d) { return Math.round(d.val * (WEIGHT[d.health] ?? 0)); }

// Render
function renderMetrics() {
  const totalVal = DATA.reduce((a,d)=>a+d.val,0);
  const totalWt  = DATA.reduce((a,d)=>a+wt(d),0);
  const lowVal   = DATA.filter(d=>d.health==='Low').reduce((a,d)=>a+d.val,0);
  const due90    = DATA.filter(d=>d.days>=0&&d.days<=90).reduce((a,d)=>a+d.val,0);
  const highCt   = DATA.filter(d=>d.health==='High').length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric fade-in"><div class="lbl">Total pipeline</div><div class="val">${fmt(totalVal)}</div><div class="sub">${DATA.length} contracts</div></div>
    <div class="metric fade-in" style="animation-delay:.05s"><div class="lbl">Weighted forecast</div><div class="val">${fmt(totalWt)}</div><div class="sub">Confidence-adjusted</div></div>
    <div class="metric fade-in" style="animation-delay:.1s"><div class="lbl">Due ≤ 90 days</div><div class="val">${fmt(due90)}</div><div class="sub">${DATA.filter(d=>d.days>=0&&d.days<=90).length} contracts</div></div>
    <div class="metric accent-red fade-in" style="animation-delay:.15s"><div class="lbl">Low health value</div><div class="val">${fmt(lowVal)}</div><div class="sub">${DATA.filter(d=>d.health==='Low').length} accounts</div></div>
    <div class="metric accent-green fade-in" style="animation-delay:.2s"><div class="lbl">High health</div><div class="val">${highCt}</div><div class="sub">${DATA.length?Math.round(highCt/DATA.length*100):0}% of accounts</div></div>
  `;
}

function renderMonthly() {
  const months = {};
  DATA.forEach(d => {
    if (d.days < 0 || !d.renewal) return;
    const p = d.renewal.split('/');
    if (p.length !== 3) return;
    const key = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]-1] + ' ' + p[2].slice(-2);
    if (!months[key]) months[key] = {val:0,wt:0};
    months[key].val += d.val;
    months[key].wt  += wt(d);
  });
  const order = ['Jan 26','Feb 26','Mar 26','Apr 26','May 26','Jun 26','Jul 26','Aug 26','Sep 26','Oct 26','Nov 26','Dec 26','Jan 27','Feb 27','Mar 27'];
  const rows = order.filter(k=>months[k]).map(k=>({month:k,...months[k]}));
  if (!rows.length) { document.getElementById('monthly-bars').innerHTML='<div class="empty">No data</div>'; return; }
  const maxVal = Math.max(...rows.map(r=>r.val));
  document.getElementById('monthly-bars').innerHTML = rows.map(r=>`
    <div class="bar-row">
      <div class="bar-lbl">${r.month}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(r.val/maxVal*100)}%;background:#60a5fa"></div>
        <div class="bar-fill2" style="width:${Math.round(r.wt/maxVal*100)}%;background:#4ade80"></div>
      </div>
      <div class="bar-val">${r.val>=1000?'£'+(r.val/1000).toFixed(0)+'k':fmt(r.val)}</div>
    </div>`).join('');
}

function renderHealth() {
  document.getElementById('health-bars').innerHTML = '';
  const total = DATA.reduce((a,d)=>a+d.val,0)||1;
  [{h:'High',color:'#4ade80'},{h:'Medium',color:'#fbbf24'},{h:'Low',color:'#f87171'},{h:'Pending',color:'#3d3d3d'}]
  .forEach(g => {
    const items = DATA.filter(d=>d.health===g.h);
    const val   = items.reduce((a,d)=>a+d.val,0);
    const wtVal = items.reduce((a,d)=>a+wt(d),0);
    const pct   = Math.round(val/total*100);
    document.getElementById('health-bars').innerHTML += `
      <div class="bar-row">
        <div class="bar-lbl">${g.h} (${items.length})</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
        <div class="bar-val">${pct}% · ${fmt(wtVal)}</div>
      </div>`;
  });
}

function renderTable() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fh = document.getElementById('fh').value;
  const so = document.getElementById('so').value;
  let rows = DATA.filter(d => {
    if (q && !d.name.toLowerCase().includes(q)) return false;
    if (fh && d.health !== fh) return false;
    return true;
  });
  if (so==='days') rows.sort((a,b)=>a.days-b.days);
  else if (so==='val') rows.sort((a,b)=>b.val-a.val);
  else rows.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('row-count').textContent = `${rows.length} contract${rows.length!==1?'s':''}`;
  const dot = {High:'h-high',Medium:'h-med',Low:'h-low',Pending:'h-pend'};
  document.getElementById('tbody').innerHTML = rows.length ? rows.map(d => {
    const dCls = d.days<0?'days-past':d.days<=30?'days-crit':d.days<=90?'days-warn':'';
    const dTxt = d.days<0?'past':d.days;
    const wtVal = wt(d);
    return `<tr>
      <td title="${d.name}" style="font-weight:500">${d.name}</td>
      <td class="mono">${fmtDate(d.end)}</td>
      <td class="mono">${fmtDate(d.renewal)}</td>
      <td class="mono ${dCls}">${dTxt}</td>
      <td class="mono">${fmt(d.val)}</td>
      <td class="mono">${wtVal>0?fmt(wtVal):'—'}</td>
      <td><div class="health-cell"><span class="health-dot ${dot[d.health]??'h-pend'}"></span>${d.health}</div></td>
    </tr>`;
  }).join('') : `<tr><td colspan="7" class="empty">No contracts match.</td></tr>`;
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  const err = document.getElementById('errorBanner');
  btn.classList.add('spinning'); btn.disabled = true;
  err.style.display = 'none';
  try {
    DATA = await loadData();
    renderMetrics(); renderMonthly(); renderHealth(); renderTable();
    const now = new Date();
    document.getElementById('lastUpdated').textContent = 'Updated ' + now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('subtitle').textContent = `As of ${now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})} · Weighted: High=90% · Medium=75% · Low=40%`;
  } catch(e) {
    err.style.display = 'block';
    err.textContent = '⚠ ' + e.message;
    console.error(e);
  }
  setTimeout(()=>{ btn.classList.remove('spinning'); btn.disabled=false; }, 600);
}

window.addEventListener('DOMContentLoaded', async () => {
  await doRefresh();
  document.getElementById('loading').classList.add('hidden');
});
</script>
</body>
</html>
